<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 800px;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            background: transparent;
        }

        #subject-card {
            display: block;
            width: 800px;
            height: auto;
            background: transparent;
        }
    </style>
</head>
<body>
    <img
        id="subject-card"
        class="variant-{{ subject_variant }}"
        src="{{ pillow_card_data_uri }}"
        alt="{{ title }}"
    >
</body>
</html>
