name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 使用 head_ref 或 ref 以支持 auto-commit
          ref: ${{ github.head_ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-asyncio types-PyYAML

      - name: Ruff format and fix
        run: |
          ruff check --fix . --ignore RUF001,RUF002,RUF003 || true
          ruff format .


      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format with ruff"
          file_pattern: '**.py'

      - name: Pytest smoke
        run: PYTHONPATH=. pytest tests/test_search_service.py tests/test_subscription_service.py
